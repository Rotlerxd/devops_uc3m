sonar.projectKey=newsradar
sonar.organization=newsradar

sonar.sources=Backend/app,Frontend/src
sonar.tests=Backend/tests,Frontend/src/test
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/alembic/versions/**,**/*.test.*,**/*.spec.*
sonar.test.inclusions=**/test_*.py,**/*.test.*,**/*.spec.*

sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=Frontend/coverage/lcov.info

sonar.python.version=3.11
